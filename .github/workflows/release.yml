name: Publish Python Package to PyPI

on:
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test,dev]"

      - name: Patch recognizers-number (Python 3.11+)
        if: matrix.python-version == '3.11' || matrix.python-version == '3.12'
        run: |
          # Locate the file and patch 'is 0' to '== 0'
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          FILE_PATH="$SITE_PACKAGES/recognizers_number/number/extractors.py"
          if [ -f "$FILE_PATH" ]; then
            echo "Patching $FILE_PATH"
            sed -i 's/is 0:/== 0:/g' "$FILE_PATH"
          else
            echo "Warning: recognizers_number not found at $FILE_PATH"
          fi

      - name: Test with pytest
        run: |
          pytest tests

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.AZURETEAMBOTS_API_SECRET }}
